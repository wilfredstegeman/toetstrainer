<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Study Buddy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f8f9fb;
    --white: #ffffff;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --text-light: #9ca3af;
    --accent: #6366f1;
    --accent-light: #eef2ff;
    --green: #10b981;
    --green-light: #d1fae5;
    --orange: #f59e0b;
    --orange-light: #fef3c7;
    --red: #ef4444;
    --border: #e5e7eb;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.05);
    --xp-color: #f59e0b;
    --streak-color: #ef4444;
    --level-color: #6366f1;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* === HEADER === */
  .header {
    background: var(--white);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg);
    border: none;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
  }

  .header-info {
    flex: 1;
    min-width: 0;
  }

  .header-title {
    font-size: 16px;
    font-weight: 700;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 3px;
    animation: pulse-dot 2s infinite;
  }

  /* === STATS BAR === */
  .stats-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .stat-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .stat-xp {
    background: var(--orange-light);
    color: #92400e;
  }

  .stat-streak {
    background: #fee2e2;
    color: #991b1b;
  }

  .stat-level {
    background: var(--accent-light);
    color: #3730a3;
  }

  .new-chat-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--bg);
    border: none;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-dim);
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .new-chat-btn:hover {
    color: var(--accent);
    background: var(--accent-light);
  }

  .new-chat-btn:active { transform: scale(0.92); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* === MODE SELECTOR === */
  .mode-bar {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .mode-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    text-align: center;
    white-space: nowrap;
  }

  .mode-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .mode-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
  }

  .mode-btn:active { transform: scale(0.96); }

  /* === XP POPUP === */
  .xp-popup {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: white;
    padding: 8px 20px;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 800;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
  }

  .xp-popup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* === LEVEL UP OVERLAY === */
  .level-up-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(4px);
  }

  .level-up-overlay.show {
    display: flex;
  }

  .level-up-card {
    background: white;
    border-radius: 24px;
    padding: 32px;
    text-align: center;
    max-width: 300px;
    animation: levelUpBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .level-up-emoji {
    font-size: 56px;
    margin-bottom: 12px;
  }

  .level-up-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .level-up-subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .level-up-close {
    padding: 10px 32px;
    border-radius: 14px;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  @keyframes levelUpBounce {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* === MESSAGES AREA === */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: min(85%, 380px);
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeIn 0.2s ease;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .msg-user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 6px;
  }

  .msg-assistant {
    align-self: flex-start;
    background: var(--white);
    color: var(--text);
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow);
  }

  .msg-assistant p { margin-bottom: 8px; }
  .msg-assistant p:last-child { margin-bottom: 0; }
  .msg-assistant strong { color: var(--accent); }
  .msg-assistant ul, .msg-assistant ol { margin: 4px 0 8px 16px; }
  .msg-assistant li { margin-bottom: 2px; }

  .msg-assistant code {
    background: var(--accent-light);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 13px;
  }

  .msg-assistant a {
    color: var(--accent);
    text-decoration: underline;
    font-weight: 500;
  }

  .msg-assistant a:active {
    opacity: 0.7;
  }

  .msg-system {
    align-self: center;
    background: transparent;
    color: var(--text-light);
    font-size: 13px;
    text-align: center;
    padding: 4px 0;
  }

  .msg-error {
    align-self: center;
    background: #fef2f2;
    color: var(--red);
    font-size: 13px;
    text-align: center;
    border-radius: 12px;
    padding: 8px 16px;
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    background: var(--white);
    padding: 12px 20px;
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow);
    display: none;
  }

  .typing.active {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .typing-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-light);
    animation: typing-bounce 1.4s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === QUICK ACTIONS === */
  .quick-actions {
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .quick-actions::-webkit-scrollbar { display: none; }

  .quick-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  .quick-btn:active { transform: scale(0.96); }

  .quick-btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .quick-btn.primary:hover { background: #5558e6; }

  /* === INPUT AREA === */
  .input-area {
    padding: 8px 16px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-field {
    flex: 1;
    padding: 10px 16px;
    border-radius: 22px;
    border: 1.5px solid var(--border);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    background: var(--bg);
    transition: border-color 0.15s;
  }

  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--text-light); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #5558e6; }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { background: var(--text-light); cursor: not-allowed; }

  /* === WELCOME STATE === */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
  }

  .welcome-emoji {
    font-size: 56px;
    margin-bottom: 16px;
  }

  .welcome-title {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .welcome-text {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 20px;
    max-width: 280px;
  }

  .welcome-mode-hint {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .welcome-mode-current {
    background: var(--accent-light);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 10px;
    font-weight: 600;
  }

  .welcome-stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .welcome-stat {
    text-align: center;
    padding: 12px 16px;
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    min-width: 80px;
  }

  .welcome-stat-value {
    font-size: 20px;
    font-weight: 800;
  }

  .welcome-stat-label {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .welcome-start {
    padding: 14px 32px;
    border-radius: 16px;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .welcome-start:hover { background: #5558e6; transform: translateY(-1px); }
  .welcome-start:active { transform: scale(0.97); }

  /* Bottom nav */
  .bottom-nav {
    display: flex;
    border-top: 1px solid var(--border);
    background: var(--white);
    flex-shrink: 0;
  }

  .nav-btn {
    flex: 1;
    padding: 10px;
    text-align: center;
    text-decoration: none;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    transition: color 0.15s;
  }

  .active-nav {
    color: var(--accent);
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Header with XP/Streak/Level -->
<div class="header">
  <a href="index.html" class="back-btn">←</a>
  <div class="header-info">
    <div class="header-title">⚡ Buddy</div>
    <div class="header-sub"><span class="status-dot"></span>Online</div>
  </div>
  <div class="stats-bar">
    <div class="stat-badge stat-streak" id="streakBadge">🔥 <span id="streakCount">0</span></div>
    <div class="stat-badge stat-xp" id="xpBadge">⭐ <span id="xpCount">0</span></div>
    <div class="stat-badge stat-level" id="levelBadge">Lvl <span id="levelNum">1</span></div>
  </div>
  <button class="new-chat-btn" onclick="newChat()" title="Nieuw gesprek">✏️</button>
</div>

<!-- Mode Selector Bar -->
<div class="mode-bar" id="modeBar">
  <button class="mode-btn active" data-mode="chill" onclick="setMode('chill')">🛋️ Chill</button>
  <button class="mode-btn" data-mode="school" onclick="setMode('school')">🏫 School</button>
  <button class="mode-btn" data-mode="onderweg" onclick="setMode('onderweg')">🚶 Onderweg</button>
</div>

<!-- XP Popup (flies in when XP earned) -->
<div class="xp-popup" id="xpPopup"></div>

<!-- Level Up Overlay -->
<div class="level-up-overlay" id="levelUpOverlay">
  <div class="level-up-card">
    <div class="level-up-emoji">🚀</div>
    <div class="level-up-title" id="levelUpTitle">Level 2!</div>
    <div class="level-up-subtitle" id="levelUpSub">Op gang</div>
    <button class="level-up-close" onclick="closeLevelUp()">Nice 💪</button>
  </div>
</div>

<!-- Welcome screen -->
<div class="welcome" id="welcome">
  <div class="welcome-emoji" id="welcomeEmoji">🛋️</div>
  <div class="welcome-title">Yo!</div>
  <div class="welcome-text" id="welcomeText">
    Ik weet wat er deze week op je bord ligt. Kies hierboven waar je bent en ik pas me aan.
  </div>
  <div class="welcome-mode-hint">
    Modus: <span class="welcome-mode-current" id="welcomeModeName">🛋️ Chill</span>
  </div>
  <div class="welcome-stats">
    <div class="welcome-stat">
      <div class="welcome-stat-value" style="color:var(--xp-color)">⭐ <span id="welcomeXP">0</span></div>
      <div class="welcome-stat-label">XP</div>
    </div>
    <div class="welcome-stat">
      <div class="welcome-stat-value" style="color:var(--streak-color)">🔥 <span id="welcomeStreak">0</span></div>
      <div class="welcome-stat-label">Streak</div>
    </div>
    <div class="welcome-stat">
      <div class="welcome-stat-value" style="color:var(--level-color)">Lvl <span id="welcomeLevel">1</span></div>
      <div class="welcome-stat-label" id="welcomeLevelName">Starter</div>
    </div>
  </div>
  <button class="welcome-start" onclick="startChat()" id="welcomeBtn">⚡ Wat kan ik doen?</button>
</div>

<!-- Chat area -->
<div class="messages" id="messages" style="display:none"></div>

<!-- Typing indicator -->
<div class="typing" id="typing">
  <div class="typing-dot"></div>
  <div class="typing-dot"></div>
  <div class="typing-dot"></div>
</div>

<!-- Quick action chips -->
<div class="quick-actions" id="quickActions" style="display:none">
  <button class="quick-btn primary" onclick="sendQuick('Wat kan ik nu doen?')">⚡ Wat kan ik doen?</button>
  <button class="quick-btn" onclick="sendQuick('Maak er een quiz van')">🎮 Maak een quiz</button>
  <button class="quick-btn" onclick="sendQuick('Leg het anders uit')">💡 Leg het anders uit</button>
  <button class="quick-btn" onclick="sendQuick('Volgende stap')">⏭️ Volgende stap</button>
  <button class="quick-btn" onclick="sendQuick('Wat kan ik nog inleveren?')">📤 Wat moet ik inleveren?</button>
</div>

<!-- Input area -->
<div class="input-area" id="inputArea" style="display:none">
  <textarea class="input-field" id="inputField" rows="1" placeholder="Typ iets..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <a href="index.html" class="nav-btn">📋 Week</a>
  <a href="tom-coach.html" class="nav-btn active-nav">⚡ Buddy</a>
  <a href="tom-niveaus.html" class="nav-btn">📖 Niveaus</a>
</div>

<script>
// ========== MODE STATE ==========
const MODE_CONFIG = {
  chill: {
    emoji: '🛋️',
    label: '🛋️ Chill',
    welcomeEmoji: '🛋️',
    welcomeText: 'Lekker chillen? Ik kan je tussendoor quizzen geven en oefeningen doen — gewoon vanuit je bed.',
    startBtn: '🛋️ Quiz me ff',
    startMsg: 'Ik lig te chillen. Geef me iets om te oefenen, vanuit de chat — geen boek.'
  },
  school: {
    emoji: '🏫',
    label: '🏫 School',
    welcomeEmoji: '🏫',
    welcomeText: 'Op school of aan je bureau? Ik help je met je opdrachten — schrift en boek erbij.',
    startBtn: '🏫 Wat kan ik doen?',
    startMsg: 'Wat kan ik nu doen? Ik heb m\'n schrift en boek bij me.'
  },
  onderweg: {
    emoji: '🚶',
    label: '🚶 Onderweg',
    welcomeEmoji: '🚶',
    welcomeText: 'Onderweg? Snelle flashcards en quizjes die je met één hand kan doen.',
    startBtn: '🚶 Flash quiz',
    startMsg: 'Ik ben onderweg. Geef me een snelle flashcard of quiz — max 2 min.'
  }
};

let currentMode = 'chill';

function loadMode() {
  try {
    const saved = localStorage.getItem('tom-buddy-mode');
    if (saved && MODE_CONFIG[saved]) return saved;
  } catch(e) {}
  return 'chill';
}

function saveMode(mode) {
  try {
    localStorage.setItem('tom-buddy-mode', mode);
  } catch(e) {}
}

function setMode(mode) {
  currentMode = mode;
  saveMode(mode);

  // Update mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  // Update welcome screen
  const cfg = MODE_CONFIG[mode];
  document.getElementById('welcomeEmoji').textContent = cfg.welcomeEmoji;
  document.getElementById('welcomeText').textContent = cfg.welcomeText;
  document.getElementById('welcomeModeName').textContent = cfg.label;
  document.getElementById('welcomeBtn').textContent = cfg.startBtn;

  // If chat already started, add a system message
  if (messagesEl.style.display !== 'none' && messagesEl.children.length > 0) {
    addMessage('system', 'Modus: ' + cfg.label);
  }
}

// ========== GAMIFICATION STATE ==========
const LEVELS = [
  { min: 0, name: 'Starter', emoji: '🌱' },
  { min: 200, name: 'Op gang', emoji: '🔥' },
  { min: 500, name: 'Lekker bezig', emoji: '⚡' },
  { min: 1000, name: 'Machine', emoji: '🤖' },
  { min: 2000, name: 'Boss mode', emoji: '👑' },
];

function loadGameState() {
  try {
    const saved = localStorage.getItem('tom-xp-state');
    if (saved) {
      const state = JSON.parse(saved);
      const today = new Date().toDateString();
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      if (state.lastDate !== today && state.lastDate !== yesterday) {
        state.streak = 0;
      }
      return state;
    }
  } catch(e) {}
  return { xp: 0, streak: 0, level: 1, lastDate: null };
}

function saveGameState(state) {
  try {
    localStorage.setItem('tom-xp-state', JSON.stringify(state));
  } catch(e) {}
}

function getLevel(xp) {
  let lvl = 1;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) {
      lvl = i + 1;
      break;
    }
  }
  return lvl;
}

function getLevelInfo(lvl) {
  return LEVELS[Math.min(lvl - 1, LEVELS.length - 1)];
}

let gameState = loadGameState();

function updateUI() {
  document.getElementById('xpCount').textContent = gameState.xp;
  document.getElementById('streakCount').textContent = gameState.streak;
  document.getElementById('levelNum').textContent = gameState.level;
  document.getElementById('welcomeXP').textContent = gameState.xp;
  document.getElementById('welcomeStreak').textContent = gameState.streak;
  document.getElementById('welcomeLevel').textContent = gameState.level;
  const info = getLevelInfo(gameState.level);
  document.getElementById('welcomeLevelName').textContent = info.name;
}

function addXP(amount) {
  const oldLevel = gameState.level;
  gameState.xp += amount;
  gameState.level = getLevel(gameState.xp);

  const today = new Date().toDateString();
  if (gameState.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (gameState.lastDate === yesterday) {
      gameState.streak += 1;
    } else if (gameState.lastDate !== today) {
      gameState.streak = 1;
    }
    gameState.lastDate = today;
  }

  saveGameState(gameState);
  updateUI();
  showXPPopup('+' + amount + ' XP');

  if (gameState.level > oldLevel) {
    setTimeout(() => showLevelUp(gameState.level), 800);
  }
}

function showXPPopup(text) {
  const popup = document.getElementById('xpPopup');
  popup.textContent = text;
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 2000);
}

function showLevelUp(lvl) {
  const info = getLevelInfo(lvl);
  document.getElementById('levelUpTitle').textContent = 'Level ' + lvl + '!';
  document.getElementById('levelUpSub').textContent = info.emoji + ' ' + info.name;
  document.getElementById('levelUpOverlay').classList.add('show');
}

function closeLevelUp() {
  document.getElementById('levelUpOverlay').classList.remove('show');
}

function parseXPFromText(text) {
  const matches = text.match(/\+(\d+)\s*XP/gi);
  if (!matches) return 0;
  let total = 0;
  for (const match of matches) {
    const num = parseInt(match.replace(/[^\d]/g, ''));
    if (!isNaN(num) && num > 0 && num <= 500) {
      total += num;
    }
  }
  return total;
}

// ========== CHAT STATE (must be before setMode init!) ==========
let chatHistory = [];
let isStreaming = false;

const messagesEl = document.getElementById('messages');
const welcomeEl = document.getElementById('welcome');
const typingEl = document.getElementById('typing');
const inputField = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
const quickActions = document.getElementById('quickActions');
const inputArea = document.getElementById('inputArea');

// Initialize
currentMode = loadMode();
setMode(currentMode);
updateUI();

// ========== CHAT PERSISTENCE ==========
const CHAT_STORAGE_KEY = 'tom-buddy-chat';
const MAX_SAVED_MESSAGES = 40; // Keep last 40 messages (20 pairs)

function saveChatHistory() {
  try {
    // Only keep the last MAX_SAVED_MESSAGES messages
    const toSave = chatHistory.slice(-MAX_SAVED_MESSAGES);
    localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify({
      messages: toSave,
      savedAt: Date.now(),
      mode: currentMode
    }));
  } catch(e) {}
}

function loadChatHistory() {
  try {
    const saved = localStorage.getItem(CHAT_STORAGE_KEY);
    if (!saved) return null;

    const data = JSON.parse(saved);
    if (!data.messages || !Array.isArray(data.messages) || data.messages.length === 0) return null;

    // Clear chats older than 4 hours — start fresh after a long break
    const fourHours = 4 * 60 * 60 * 1000;
    if (Date.now() - data.savedAt > fourHours) {
      localStorage.removeItem(CHAT_STORAGE_KEY);
      return null;
    }

    return data;
  } catch(e) {
    return null;
  }
}

function clearChatHistory() {
  try {
    localStorage.removeItem(CHAT_STORAGE_KEY);
  } catch(e) {}
}

function newChat() {
  // Clear saved chat
  clearChatHistory();
  chatHistory = [];

  // Clear displayed messages
  messagesEl.innerHTML = '';

  // Show welcome screen again
  welcomeEl.style.display = 'flex';
  messagesEl.style.display = 'none';
  quickActions.style.display = 'none';
  inputArea.style.display = 'none';

  // Update welcome UI for current mode
  setMode(currentMode);
  updateUI();
}

function restoreChat(savedData) {
  chatHistory = savedData.messages;

  // Restore mode if it was saved
  if (savedData.mode && MODE_CONFIG[savedData.mode]) {
    currentMode = savedData.mode;
    setMode(currentMode);
  }

  // Hide welcome, show chat
  welcomeEl.style.display = 'none';
  messagesEl.style.display = 'flex';
  quickActions.style.display = 'flex';
  inputArea.style.display = 'flex';

  // Re-render all saved messages (without animation)
  for (const msg of chatHistory) {
    const div = document.createElement('div');
    if (msg.role === 'user') {
      div.className = 'msg msg-user';
      div.textContent = msg.content;
    } else {
      div.className = 'msg msg-assistant';
      div.innerHTML = formatText(msg.content);
    }
    // No animation for restored messages
    div.style.animation = 'none';
    messagesEl.appendChild(div);
  }

  // Scroll to bottom after restore
  setTimeout(scrollToBottom, 100);
}

// Check for saved chat on page load
const savedChat = loadChatHistory();
if (savedChat) {
  restoreChat(savedChat);
}

function startChat() {
  welcomeEl.style.display = 'none';
  messagesEl.style.display = 'flex';
  quickActions.style.display = 'flex';
  inputArea.style.display = 'flex';

  const cfg = MODE_CONFIG[currentMode];
  sendQuick(cfg.startMsg);
}

function sendQuick(text) {
  if (isStreaming) return;
  inputField.value = '';
  doSend(text);
}

function sendMessage() {
  const text = inputField.value.trim();
  if (!text || isStreaming) return;
  inputField.value = '';
  inputField.style.height = 'auto';
  doSend(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function doSend(text) {
  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  saveChatHistory();

  isStreaming = true;
  sendBtn.disabled = true;
  typingEl.classList.add('active');
  scrollToBottom();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: chatHistory,
        mode: currentMode
      }),
    });

    typingEl.classList.remove('active');

    if (!response.ok) {
      let errorMsg = 'Er ging iets mis. Probeer opnieuw.';
      try {
        const err = await response.json();
        if (err.error) errorMsg = err.error;
      } catch(e) {}
      addMessage('error', errorMsg);
      isStreaming = false;
      sendBtn.disabled = false;
      return;
    }

    const contentType = response.headers.get('content-type') || '';

    if (contentType.includes('text/event-stream')) {
      const assistantEl = addMessage('assistant', '');
      let fullText = '';

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const jsonStr = line.slice(6).trim();
          if (!jsonStr || jsonStr === '[DONE]') continue;

          try {
            const data = JSON.parse(jsonStr);
            if (data.type === 'content_block_delta' && data.delta && data.delta.type === 'text_delta') {
              fullText += data.delta.text;
              assistantEl.innerHTML = formatText(fullText);
              scrollToBottom();
            }
          } catch (e) {}
        }
      }

      chatHistory.push({ role: 'assistant', content: fullText });
      saveChatHistory();

      const earnedXP = parseXPFromText(fullText);
      if (earnedXP > 0) {
        setTimeout(() => addXP(earnedXP), 500);
      }

    } else {
      const data = await response.json();
      const text = data.content?.[0]?.text || data.error || 'Geen antwoord';
      addMessage('assistant', formatText(text));
      chatHistory.push({ role: 'assistant', content: text });
      saveChatHistory();

      const earnedXP = parseXPFromText(text);
      if (earnedXP > 0) {
        setTimeout(() => addXP(earnedXP), 500);
      }
    }

  } catch (error) {
    typingEl.classList.remove('active');
    addMessage('error', 'Geen verbinding. Check je internet en probeer opnieuw.');
  }

  isStreaming = false;
  sendBtn.disabled = false;
  inputField.focus();
  scrollToBottom();
}

function addMessage(type, content) {
  const div = document.createElement('div');

  if (type === 'user') {
    div.className = 'msg msg-user';
    div.textContent = content;
  } else if (type === 'assistant') {
    div.className = 'msg msg-assistant';
    div.innerHTML = content ? formatText(content) : '';
  } else if (type === 'error') {
    div.className = 'msg msg-error';
    div.textContent = content;
  } else {
    div.className = 'msg msg-system';
    div.textContent = content;
  }

  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

function formatText(text) {
  // First pass: inline formatting
  let html = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(https?:\/\/[^\s<)]+)/g, function(url, offset) {
      var before = text.substring(Math.max(0, offset - 10), offset);
      if (before.indexOf('href="') !== -1 || before.indexOf("'>") !== -1) return url;
      var beforeAnchor = text.substring(Math.max(0, offset - 50), offset);
      if (beforeAnchor.indexOf('noopener">') !== -1) return url;
      return '<a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>';
    });

  // Split answer options like "A) ... B) ... C) ... D) ..." onto separate lines
  html = html.replace(/([A-D]\))\s/g, '\n$1 ');

  // Convert markdown headers
  html = html.replace(/^### (.+)$/gm, '<strong style="font-size:14px">$1</strong>');
  html = html.replace(/^## (.+)$/gm, '<strong style="font-size:16px">$1</strong>');

  // Convert markdown lists (- item or * item)
  html = html.replace(/^[-*] (.+)$/gm, '• $1');

  // Paragraphs
  html = html.split('\n\n').map(para =>
    '<p>' + para.replace(/\n/g, '<br>') + '</p>'
  ).join('');

  return html;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    scrollToBottom();
  });
}
</script>
